<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WMNF Brook Trout Survey</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 13px; background: #1a1a2e; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }

  header { background: #16213e; padding: 10px 16px; border-bottom: 1px solid #0f3460; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  header h1 { font-size: 15px; font-weight: 600; color: #4fc3f7; white-space: nowrap; }
  header h1 span { font-size: 11px; font-weight: 400; color: #888; margin-left: 6px; }

  .filters { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .filter-group { display: flex; align-items: center; gap: 6px; }
  .filter-group label { font-size: 12px; color: #aaa; }
  select, input[type=range] { background: #0f3460; border: 1px solid #4fc3f7; color: #e0e0e0; border-radius: 4px; padding: 3px 6px; font-size: 12px; }
  .county-btns { display: flex; gap: 4px; }
  .county-btn { padding: 3px 8px; border-radius: 12px; border: 1px solid #4fc3f7; background: transparent; color: #4fc3f7; cursor: pointer; font-size: 11px; transition: all 0.15s; }
  .county-btn.active { background: #4fc3f7; color: #1a1a2e; font-weight: 600; }
  #density-val { font-size: 12px; color: #4fc3f7; min-width: 30px; }
  #site-count { font-size: 12px; color: #aaa; margin-left: 8px; }

  .main { display: flex; flex: 1; overflow: hidden; }
  #map { flex: 1; }

  .sidebar { width: 340px; display: flex; flex-direction: column; border-left: 1px solid #0f3460; }
  .sidebar-header { padding: 8px 12px; background: #16213e; border-bottom: 1px solid #0f3460; font-size: 12px; color: #aaa; display: flex; justify-content: space-between; align-items: center; }
  .sort-controls { display: flex; gap: 4px; }
  .sort-btn { padding: 2px 6px; border-radius: 3px; border: 1px solid #333; background: transparent; color: #aaa; cursor: pointer; font-size: 11px; }
  .sort-btn.active { border-color: #4fc3f7; color: #4fc3f7; }

  #table-container { overflow-y: auto; flex: 1; }
  table { width: 100%; border-collapse: collapse; }
  th { position: sticky; top: 0; background: #16213e; padding: 6px 8px; text-align: left; font-size: 11px; color: #aaa; font-weight: 500; border-bottom: 1px solid #0f3460; cursor: pointer; user-select: none; white-space: nowrap; }
  th:hover { color: #4fc3f7; }
  th .sort-arrow { opacity: 0.3; }
  th.sorted .sort-arrow { opacity: 1; color: #4fc3f7; }
  tr { border-bottom: 1px solid #0f3460; cursor: pointer; transition: background 0.1s; }
  tr:hover { background: #0f3460; }
  tr.selected { background: #1a4a7a; }
  td { padding: 6px 8px; vertical-align: top; }
  .stream-name { font-weight: 500; color: #e0e0e0; font-size: 12px; }
  .stream-meta { font-size: 10px; color: #888; margin-top: 1px; }
  .metric { text-align: right; font-size: 12px; font-variant-numeric: tabular-nums; }
  .metric.high { color: #69f0ae; font-weight: 600; }
  .metric.med  { color: #ffd54f; }
  .metric.low  { color: #888; }
  .metric.none { color: #444; }

  .legend { padding: 8px 12px; background: #16213e; border-top: 1px solid #0f3460; font-size: 11px; color: #aaa; }
  .legend-row { display: flex; align-items: center; gap: 6px; margin-top: 4px; flex-wrap: wrap; }
  .dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }

  /* Leaflet popup */
  .leaflet-popup-content-wrapper { background: #16213e; color: #e0e0e0; border: 1px solid #4fc3f7; border-radius: 6px; }
  .leaflet-popup-tip { background: #16213e; }
  .popup-title { font-weight: 600; font-size: 13px; color: #4fc3f7; margin-bottom: 6px; }
  .popup-grid { display: grid; grid-template-columns: auto auto; gap: 2px 12px; font-size: 12px; }
  .popup-label { color: #aaa; }
  .popup-val { color: #e0e0e0; font-weight: 500; }
</style>
</head>
<body>

<header>
  <h1>🎣 WMNF Brook Trout Survey</h1>
  <div class="filters">
    <div class="filter-group">
      <label>County:</label>
      <div class="county-btns" id="county-btns"></div>
    </div>
    <div class="filter-group">
      <label>Min adult density:</label>
      <input type="range" id="density-slider" min="0" max="20" step="0.5" value="0">
      <span id="density-val">0</span>
    </div>
    <div class="filter-group">
      <label>Sort by:</label>
      <select id="sort-select">
        <option value="score_b">Score B (recency-adjusted) ★</option>
        <option value="score_a">Score A (raw composite)</option>
        <option value="adult_dens">Adult Density</option>
        <option value="adult_bio">Adult Biomass</option>
        <option value="total_dens">Total Density</option>
        <option value="year">Survey Year</option>
      </select>
    </div>
  </div>
  <span id="site-count"></span>
</header>

<div class="main">
  <div id="map"></div>
  <div class="sidebar">
    <div class="sidebar-header">
      <span>Streams (click to zoom)</span>
    </div>
    <div id="table-container">
      <table>
        <thead>
          <tr>
            <th data-col="name">Stream</th>
            <th data-col="sort" class="sorted" id="sort-col-header">Score B ▾</th>
            <th data-col="adult_bio">Bio</th>
            <th data-col="year">Year</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
    <div class="legend">
      <span id="legend-label">Adult density (fish/100m²)</span>
      <div class="legend-row" id="legend-row">
        <span class="dot" style="background:#69f0ae"></span> <span id="leg-hi">≥8</span>
        <span class="dot" style="background:#ffd54f"></span> <span id="leg-mid">3–8</span>
        <span class="dot" style="background:#ef5350"></span> <span id="leg-lo">1–3</span>
        <span class="dot" style="background:#555"></span> low/no data
      </div>
    </div>
  </div>
</div>

// --- Map setup ---
const map = L.map('map').setView([44.1, -71.3], 10);
const topo = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}', {
  attribution: 'Tiles © Esri',
  maxZoom: 18
});
const satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
  attribution: 'Tiles © Esri',
  maxZoom: 18
});
topo.addTo(map);

const nhd = L.tileLayer.wms('https://hydro.nationalmap.gov/arcgis/services/nhd/MapServer/WMSServer', {
  layers: '2,3,4,5,6,7,8',
  format: 'image/png',
  transparent: true,
  opacity: 0.7,
  attribution: 'NHD © USGS',
});

L.control.layers(
  {'Topo': topo, 'Satellite': satellite},
  {'NHD Streams (USGS)': nhd},
  {position: 'bottomleft'}
).addTo(map);

// --- State ---
let activeCounties = new Set();
let minDensity = 0;
let sortCol = 'score_b';
let selectedSite = null;
const markers = new Map(); // index -> marker

// --- County buttons ---
const counties = [...new Set(ALL_SITES.map(s => s.county))].sort();
const countyBtns = document.getElementById('county-btns');
counties.forEach(c => {
  const btn = document.createElement('button');
  btn.className = 'county-btn';
  btn.textContent = c;
  btn.dataset.county = c;
  btn.addEventListener('click', () => {
    if (activeCounties.has(c)) activeCounties.delete(c);
    else activeCounties.add(c);
    btn.classList.toggle('active');
    render();
  });
  countyBtns.appendChild(btn);
});

// --- Density slider ---
const slider = document.getElementById('density-slider');
const densVal = document.getElementById('density-val');
slider.addEventListener('input', () => {
  minDensity = parseFloat(slider.value);
  densVal.textContent = minDensity;
  render();
});

// --- Sort select ---
const sortLabels = {
  score_b: 'Score B ▾', score_a: 'Score A ▾',
  adult_dens: 'Adult Dens ▾', adult_bio: 'Adult Bio ▾',
  total_dens: 'Total Dens ▾', year: 'Year ▾',
};
document.getElementById('sort-select').addEventListener('change', e => {
  sortCol = e.target.value;
  document.getElementById('sort-col-header').textContent = sortLabels[sortCol] || sortCol;
  render();
});

// --- Color helper ---
const thresholds = {
  score_a:     [70, 35, 20],
  score_b:     [60, 30, 15],
  adult_dens:  [8, 3, 1],
  adult_bio:   [6, 2, 0.5],
  total_dens:  [20, 8, 2],
  year:        [2020, 2015, 2010],
};

function markerColor(val, col) {
  const [hi, mid, lo] = thresholds[col] || thresholds.adult_dens;
  if (val === null || val === undefined) return '#555';
  if (val >= hi)  return '#69f0ae';
  if (val >= mid) return '#ffd54f';
  if (val >= lo)  return '#ef5350';
  return '#555';
}

function markerRadius(val, col) {
  if (!val) return 4;
  const [hi] = thresholds[col] || thresholds.adult_dens;
  return Math.max(4, Math.min(16, 4 + (val / hi) * 10));
}

function metricClass(d) {
  if (d === null || d === undefined) return 'none';
  if (d >= 8)  return 'high';
  if (d >= 3)  return 'med';
  if (d >= 1)  return 'low';
  return 'none';
}

function fmt(v) {
  return (v !== null && v !== undefined) ? v.toFixed(2) : '—';
}

// --- Filter ---
function filtered() {
  return ALL_SITES.filter(s => {
    if (activeCounties.size > 0 && !activeCounties.has(s.county)) return false;
    const d = s.adult_dens;
    if (minDensity > 0 && (d === null || d < minDensity)) return false;
    return true;
  });
}

// --- Render ---
function render() {
  const sites = filtered();

  // Sort
  sites.sort((a, b) => {
    const av = a[sortCol] ?? -1;
    const bv = b[sortCol] ?? -1;
    return bv - av;
  });

  document.getElementById('site-count').textContent = `${sites.length} sites`;
  updateLegend();

  // Clear markers
  markers.forEach(m => map.removeLayer(m));
  markers.clear();

  // Add markers
  sites.forEach((s, i) => {
    const val = s[sortCol];
    const color = markerColor(val, sortCol);
    const radius = markerRadius(val, sortCol);
    const marker = L.circleMarker([s.lat, s.lon], {
      radius,
      fillColor: color,
      color: '#fff',
      weight: 0.5,
      fillOpacity: 0.85,
    });

    marker.bindPopup(`
      <div class="popup-title">${s.water_body}</div>
      <div class="popup-grid">
        <span class="popup-label">Site</span><span class="popup-val">${s.site_name || '—'}</span>
        <span class="popup-label">Town</span><span class="popup-val">${s.town}, ${s.county}</span>
        <span class="popup-label">Surveyed</span><span class="popup-val">${s.year} (${s.surveys} survey${s.surveys !== 1 ? 's' : ''})</span>
        <span class="popup-label">Adult density</span><span class="popup-val">${fmt(s.adult_dens)} fish/100m²</span>
        <span class="popup-label">Adult biomass</span><span class="popup-val">${fmt(s.adult_bio)} g/100m²</span>
        <span class="popup-label">Total density</span><span class="popup-val">${fmt(s.total_dens)} fish/100m²</span>
        <span class="popup-label">EBT count</span><span class="popup-val">${s.ebt_n ?? '—'}</span>
        <span class="popup-label">Species richness</span><span class="popup-val">${s.richness ?? '—'}</span>
        <span class="popup-label">Watershed</span><span class="popup-val">${s.huc8 || '—'}</span>
        ${s.score_a != null ? `<span class="popup-label">Score A / B</span><span class="popup-val">${s.score_a.toFixed(1)} (${s.grade_a}) / ${s.score_b.toFixed(1)} (${s.grade_b})</span>` : ''}
      </div>
    `);

    marker.on('click', () => {
      highlightRow(i);
    });

    marker.addTo(map);
    markers.set(i, marker);
  });

  // Render table
  const tbody = document.getElementById('table-body');
  tbody.innerHTML = '';
  sites.forEach((s, i) => {
    const tr = document.createElement('tr');
    if (selectedSite === i) tr.classList.add('selected');
    tr.innerHTML = `
      <td>
        <div class="stream-name">${s.water_body}</div>
        <div class="stream-meta">${s.town}, ${s.county}</div>
      </td>
      <td class="metric ${metricClass(s[sortCol])}">${fmt(s[sortCol])}</td>
      <td class="metric ${metricClass(s.adult_bio)}">${fmt(s.adult_bio)}</td>
      <td class="metric">${s.year}</td>
    `;
    tr.addEventListener('click', () => {
      map.setView([s.lat, s.lon], 13);
      markers.get(i)?.openPopup();
      highlightRow(i);
    });
    tbody.appendChild(tr);
  });
}

const legendLabels = {
  score_a:    ['Score A — raw composite (0–100)', '≥70', '35–70', '20–35'],
  score_b:    ['Score B — recency-adjusted (0–100)', '≥60', '30–60', '15–30'],
  adult_dens: ['Adult density (fish/100m²)', '≥8', '3–8', '1–3'],
  adult_bio:  ['Adult biomass (g/100m²)',     '≥6', '2–6', '0.5–2'],
  total_dens: ['Total EBT density (fish/100m²)', '≥20', '8–20', '2–8'],
  year:       ['Survey year', '≥2020', '2015–2020', '2010–2015'],
};

function updateLegend() {
  const [label, hi, mid, lo] = legendLabels[sortCol] || legendLabels.adult_dens;
  document.getElementById('legend-label').textContent = label;
  document.getElementById('leg-hi').textContent = hi;
  document.getElementById('leg-mid').textContent = mid;
  document.getElementById('leg-lo').textContent = lo;
}

function highlightRow(i) {
  selectedSite = i;
  document.querySelectorAll('#table-body tr').forEach((tr, j) => {
    tr.classList.toggle('selected', j === i);
  });
  // Scroll row into view
  const rows = document.querySelectorAll('#table-body tr');
  if (rows[i]) rows[i].scrollIntoView({ block: 'nearest' });
}

render();
</script>
